{% extends 'base.html' %}

{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #1a1a2e 0%, #2E86AB 100%);">
    <div class="card border-0 shadow-lg" style="width: 420px; border-radius: 16px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-lock-fill text-primary" style="font-size: 2.5rem;"></i>
                <h4 class="fw-bold mt-2">Parolni tiklash</h4>
                <p class="text-muted small">Email manzilingizni kiriting</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email manzil</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control"
                               placeholder="email@example.com" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    Yuborish
                </button>
                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-muted small">
                        <i class="bi bi-arrow-left me-1"></i>Loginga qaytish
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
