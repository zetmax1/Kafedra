# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name temp.jbnuu.uz www.temp.jbnuu.uz;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name temp.jbnuu.uz www.temp.jbnuu.uz;

    # SSL certificates
    ssl_certificate /etc/ssl/jbnuu.uz/fullchain.pem;
    ssl_certificate_key /etc/ssl/jbnuu.uz/jbnuu.uz.key;
    ssl_trusted_certificate /etc/ssl/jbnuu.uz/ca-bundle.crt;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Static files (served by WhiteNoise via Gunicorn)
    # If you want Nginx to serve static directly, uncomment and set correct path:
    # location /static/ {
    #     alias /var/www/kafedra/Kafedra/staticfiles/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # Media files
    # location /media/ {
    #     alias /var/www/kafedra/Kafedra/media/;
    #     expires 7d;
    # }

    # Proxy to Django/Gunicorn running in Docker on port 8088
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
