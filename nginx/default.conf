upstream django_app {
    server web:8088;
}

server {
    listen 80;
    server_name temp.jbnuu.uz, www.temp.jbnuu.uz;

    ssl_certificate /etc/ssl/jbnuu.uz/fullchain.pem;
    ssl_certificate_key /etc/ssl/jbnuu.uz/jbnuu.uz.key;
    ssl_trusted_certificate /etc/ssl/jbnuu.uz/ca-bundle.crt;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;
    

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (uploaded PDFs, Excel, etc.)
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy to Django/Gunicorn
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
